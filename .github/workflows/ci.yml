name: CI

on:
    push:
        branches: [master, main]
    pull_request:
        branches: [master, main]
    workflow_dispatch:

env:
    REGISTRY: ghcr.io

jobs:
    lint-and-typecheck:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Typecheck
              run: npx turbo typecheck --filter=infrastack --filter=@infrastack/backend --filter=@infrastack/worker --filter=@infrastack/caddy --filter=@infrastack/demo

            - name: Lint
              run: npx turbo lint --filter=infrastack --filter=@infrastack/backend --filter=@infrastack/worker --filter=@infrastack/caddy

    build-demo:
        runs-on: ubuntu-latest
        needs: lint-and-typecheck
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build demo app
              run: npx turbo build --filter=@infrastack/demo

    build-and-push:
        runs-on: ubuntu-latest
        needs: lint-and-typecheck
        if: github.event_name != 'pull_request'
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Backend image metadata
              id: backend-meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/infrastack-backend
                  tags: |
                      type=sha
                      type=raw,value=latest,enable={{is_default_branch}}

            - name: Worker image metadata
              id: worker-meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/infrastack-worker
                  tags: |
                      type=sha
                      type=raw,value=latest,enable={{is_default_branch}}

            - name: Caddy image metadata
              id: caddy-meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/infrastack-caddy
                  tags: |
                      type=sha
                      type=raw,value=latest,enable={{is_default_branch}}

            - name: Build and push backend image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: ./apps/backend/Dockerfile
                  push: true
                  tags: ${{ steps.backend-meta.outputs.tags }}
                  labels: ${{ steps.backend-meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Build and push worker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: ./apps/worker/Dockerfile
                  push: true
                  tags: ${{ steps.worker-meta.outputs.tags }}
                  labels: ${{ steps.worker-meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Build and push caddy image
              uses: docker/build-push-action@v5
              with:
                  context: ./packages/caddy
                  file: ./packages/caddy/Dockerfile
                  push: true
                  tags: ${{ steps.caddy-meta.outputs.tags }}
                  labels: ${{ steps.caddy-meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
